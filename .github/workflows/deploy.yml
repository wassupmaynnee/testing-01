name: deploy

# Continuous delivery: build the API image, push it to GHCR, and deploy to the
# container host. Gated on main (and manual dispatch). Requires these repo
# secrets for the deploy job: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY,
# DEPLOY_PATH (the dir holding docker-compose.saas.yml + a real .env on the host).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH to the container host
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            export CLIPPIFY_IMAGE="ghcr.io/${{ github.repository }}:latest"
            docker compose -f docker-compose.saas.yml pull
            docker compose -f docker-compose.saas.yml up -d --no-build
            docker image prune -f
            # Liveness gate: fail the deploy if the API isn't healthy.
            for i in $(seq 1 30); do
              curl -fsS http://localhost:8011/health && exit 0
              sleep 5
            done
            echo "API did not become healthy after deploy" >&2
            exit 1
