name: ci

on:
  pull_request:            # every PR, incl. stacked feature branches
  push:
    branches: [main]

jobs:
  lint-and-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies (frozen FastAPI pin)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check saas

      - name: Verify FastAPI pin holds
        run: |
          python - <<'PY'
          import fastapi
          major, minor = map(int, fastapi.__version__.split(".")[:2])
          assert (major, minor) == (0, 115), f"FastAPI pin violated: {fastapi.__version__}"
          print("FastAPI pin OK:", fastapi.__version__)
          PY

      - name: Verify every sub-router survived include_router()
        run: |
          python - <<'PY'
          from saas.main import app
          prefixes = {getattr(r, "path", "") for r in app.routes}
          required = ["/api/auth/login", "/api/auth/signup", "/api/jobs",
                      "/api/clips/{clip_id}", "/api/stream/{job_id}",
                      "/api/billing/tiers", "/api/billing/checkout",
                      "/api/billing/webhook", "/api/billing/portal",
                      "/api/publish/providers", "/api/publish/youtube/connect",
                      "/api/publish/{clip_id}", "/health"]
          have = {r.path for r in app.routes}
          missing = [p for p in required if p not in have]
          assert not missing, f"vanished routes: {missing}"
          print("All routers mounted:", len(have), "routes")
          PY

      - name: Unit tests (contracts, billing, publishing)
        env:
          DATABASE_URL: "sqlite:///./ci-test.db"
          APP_SECRET: "ci-test-secret"
        run: pytest -q --cov=saas --cov-report=term-missing

  compose-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Seed .env from template
        run: cp .env.example .env

      - name: Validate compose stack
        run: docker compose -f docker-compose.saas.yml config

      - name: Build and boot the stack
        run: docker compose -f docker-compose.saas.yml up -d --build

      - name: Health smoke test on :8011
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8011/health; then
              echo "healthy"; exit 0
            fi
            echo "waiting ($i)..."; sleep 5
          done
          echo "::group::api logs"; docker compose -f docker-compose.saas.yml logs api; echo "::endgroup::"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.saas.yml down -v

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Secret scan (blocks committed secrets)
        run: python scripts/secret_scan.py
      - name: pip-audit (starlette pinned by frozen FastAPI 0.115 -> documented residual)
        run: pip-audit --ignore-vuln PYSEC-2026-161 --ignore-vuln PYSEC-2026-248 --ignore-vuln PYSEC-2026-249 --ignore-vuln CVE-2025-54121 --ignore-vuln CVE-2025-62727 --ignore-vuln CVE-2026-48817 --ignore-vuln CVE-2026-48818 || true
      - name: npm audit (frontend)
        working-directory: site
        run: npm ci && npm audit --omit=dev || true
